<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Explorer</title>
    <link href="./output.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-r from-indigo-300 to-pink-400 min-h-screen flex flex-col">

    <!-- Header Section -->
    <header class="bg-gradient-to-r from-indigo-800 to-pink-800 text-white text-center py-4 shadow-lg">
        <h1 class="text-2xl font-bold">☁️ Weather Explorer</h1>
    </header>

    <!-- Main Content -->
    <section class="flex flex-col lg:flex-row p-5 gap-10 container mx-auto">

        <!-- Search Panel -->
        <section class="lg:w-1/3 bg-white/80 backdrop-blur-md shadow-lg rounded-lg p-6 space-y-6">
            <label for="city-input" class="text-lg font-semibold">Search for a City</label>
            <input type="text" id="city-input" placeholder="Example: Mumbai, New York..." 
                class="user-city w-full p-3 border rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">

            <form class="space-y-4">
                <button class="btn-search w-full bg-red-600 text-white p-3 rounded-lg hover:bg-pink-800 transition">
                    Find Weather
                </button>
                <p class="text-center font-semibold">OR</p>
                <button class="btn-location w-full bg-gray-700 text-white p-3 rounded-lg hover:bg-gray-900 transition">
                    Get Current Location 📍
                </button>
            </form>

            <!-- Recent Cities -->
            <section class="recent-search">
                <button class="bg-gray-600 text-white p-3 w-full rounded-lg">📌 Recently Searched</button>
                <div id="recent-locations" class="recent-list bg-gray-200 p-2 rounded-lg"></div>
            </section>
        </section>

        <!-- Weather Display -->
        <section class="flex-1 flex flex-col space-y-8">

            <!-- Current Weather Details -->
            <article class="weather-now bg-white/80 backdrop-blur-md p-6 shadow-xl rounded-lg flex justify-between items-center">
                <div class="space-y-2">
                    <h2 class="city-title text-xl font-bold">(______)</h2>
                    <p>🌡️ Temp: <span class="current-temp">(______)</span></p>
                    <p>💨 Wind: <span class="current-wind">(______)</span></p>
                    <p>💧 Humidity: <span class="current-humidity">(______)</span></p>
                </div>
                <img class="weather-symbol w-16 h-16" />
            </article>

            <!-- 5-Day Forecast -->
            <section>
                <h1 class="text-xl font-bold text-white text-center mb-4">⏳ 5-Day Forecast</h1>
                <div class="forecast-grid grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                    
                    <!-- Forecast Cards -->
                    <article class="day-card bg-white/80 backdrop-blur-lg p-4 rounded-lg shadow-md text-center">
                        <span class="forecast-date font-semibold block">(_______)</span>
                        <img class="forecast-icon mx-auto my-2" />
                        <p>🌡️ Temp: <span class="forecast-temp">(______)</span></p>
                        <p>💨 Wind: <span class="forecast-wind">(______)</span></p>
                        <p>💧 Humidity: <span class="forecast-humidity">(______)</span></p>
                    </article>

                    <article class="day-card bg-white/80 backdrop-blur-lg p-4 rounded-lg shadow-md text-center">
                        <span class="forecast-date font-semibold block">(_______)</span>
                        <img class="forecast-icon mx-auto my-2" />
                        <p>🌡️ Temp: <span class="forecast-temp">(______)</span></p>
                        <p>💨 Wind: <span class="forecast-wind">(______)</span></p>
                        <p>💧 Humidity: <span class="forecast-humidity">(______)</span></p>
                    </article>

                </div>
            </section>
        </section>
    </section>

    <script src="app.js"></script>
</body>
</html>
